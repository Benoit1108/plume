name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- security : scan de secrets sur tout l'historique (BLOQUANT : dépôt public) ---
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- backend : dependencies -> security -> quality -> test ---
  backend:
    name: Backend (Symfony)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: plume
          POSTGRES_PASSWORD: plume
          POSTGRES_DB: plume
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U plume"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://plume:plume@127.0.0.1:5432/plume?serverVersion=17&charset=utf8"
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none
      - name: Info
        run: php -v && composer --version

      # dependencies
      - name: Validate composer.json
        run: composer validate
      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          working-directory: api

      # security
      - name: Security audit
        run: composer audit

      # quality
      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists
      - name: Warm up cache (compile container for PHPStan)
        run: php bin/console cache:warmup
      - name: Coding standards
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: Static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G
      - name: Architecture boundaries (deptrac)
        run: vendor/bin/deptrac analyse --no-progress
      - name: Validate Doctrine mapping
        run: php bin/console doctrine:schema:validate --skip-sync
      - name: OpenAPI contract sync
        run: |
          php bin/console api:openapi:export --output=openapi.generated.json
          if ! diff <(jq -S . openapi.json) <(jq -S . openapi.generated.json); then
            echo "::error::openapi.json obsolète — régénère : bin/console api:openapi:export --output=openapi.json"
            exit 1
          fi

      # test (unitaires + fonctionnels : le service postgres héberge la base _test)
      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console messenger:setup-transports --env=test
      - name: Provision runtime role (RLS)
        run: php bin/console app:db:provision-app-role --env=test
      - name: Tests
        run: vendor/bin/phpunit

  # --- frontend : dependencies -> security -> quality -> test ---
  frontend:
    name: Frontend (Nuxt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Info
        run: node -v && npm -v

      # dependencies
      - name: Install dependencies
        run: npm ci

      # security : BLOQUANT sur les dépendances runtime, informatif sur les devDeps
      # (vulnérabilités transitives d'outillage — revue fin M1).
      - name: Security audit (runtime deps — blocking)
        run: npm audit --omit=dev --audit-level=high
      - name: Security audit (all deps — informative)
        run: npm audit --audit-level=high
        continue-on-error: true

      # quality
      - name: OpenAPI types in sync
        run: |
          npm run gen:types
          if ! git diff --quiet types/api-generated.ts; then
            echo "::error::types/api-generated.ts obsolète — régénère : npm run gen:types (après make openapi)"
            git --no-pager diff types/api-generated.ts | head -60
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build

      # test
      - name: Tests (coverage)
        run: npm run test:coverage

  # --- e2e : navigateur réel contre la stack complète (SPA montée côté client, proxy API) ---
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Build API image + start Postgres
        run: |
          docker compose build php
          docker compose up -d database

      - name: Install backend dependencies (in container)
        run: docker compose run --rm --no-deps php composer install --no-interaction --no-progress

      # Migrations, rôle runtime et user e2e créés par le PROPRIÉTAIRE (contourne la RLS) ;
      # l'API/worker démarrent ENSUITE avec le rôle runtime plume_app (soumis à la RLS).
      - name: Prepare backend (owner role)
        env:
          OWNER_URL: "postgresql://plume:plume@database:5432/plume?serverVersion=17&charset=utf8"
        run: |
          docker compose run --rm --no-deps php php bin/console lexik:jwt:generate-keypair --skip-if-exists
          docker compose run --rm -e DATABASE_URL="$OWNER_URL" php php bin/console doctrine:migrations:migrate --no-interaction
          docker compose run --rm -e DATABASE_URL="$OWNER_URL" php php bin/console messenger:setup-transports
          docker compose run --rm -e DATABASE_URL="$OWNER_URL" php php bin/console app:db:provision-app-role
          docker compose run --rm -e DATABASE_URL="$OWNER_URL" php php bin/console app:user:create e2e@plume.test e2e-secret-123

      - name: Start API + workers (runtime role plume_app)
        run: docker compose up -d php worker worker_io

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            curl -skf https://localhost:8443/api/v1/docs > /dev/null && exit 0
            sleep 2
          done
          docker compose logs php
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: app
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Run E2E smoke tests
        run: npx playwright test
        working-directory: app

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: app/test-results/
          retention-days: 7
