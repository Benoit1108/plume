name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- security : scan de secrets sur tout l'historique (non bloquant) ---
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- backend : dependencies -> security -> quality -> test ---
  backend:
    name: Backend (Symfony)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: plume
          POSTGRES_PASSWORD: plume
          POSTGRES_DB: plume
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U plume"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://plume:plume@127.0.0.1:5432/plume?serverVersion=17&charset=utf8"
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none
      - name: Info
        run: php -v && composer --version

      # dependencies
      - name: Validate composer.json
        run: composer validate
      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          working-directory: api

      # security
      - name: Security audit
        run: composer audit

      # quality
      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists
      - name: Warm up cache (compile container for PHPStan)
        run: php bin/console cache:warmup
      - name: Coding standards
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: Static analysis
        run: vendor/bin/phpstan analyse
      - name: Validate Doctrine mapping
        run: php bin/console doctrine:schema:validate --skip-sync
      - name: OpenAPI contract sync
        run: |
          php bin/console api:openapi:export --output=openapi.generated.json
          if ! diff <(jq -S . openapi.json) <(jq -S . openapi.generated.json); then
            echo "::error::openapi.json obsolète — régénère : bin/console api:openapi:export --output=openapi.json"
            exit 1
          fi

      # test
      - name: Tests
        run: vendor/bin/phpunit

  # --- frontend : dependencies -> security -> quality -> test ---
  frontend:
    name: Frontend (Nuxt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Info
        run: node -v && npm -v

      # dependencies
      - name: Install dependencies
        run: npm ci

      # security (non bloquant : vulnérabilités transitives dev)
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # quality
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build

      # test
      - name: Tests (coverage)
        run: npm run test:coverage
