version: 2
updates:
  - package-ecosystem: composer
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # On reste sur Symfony 7.4 LTS tant que l'écosystème (Doctrine…) n'est pas prêt pour SF8.
      - dependency-name: "symfony/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
