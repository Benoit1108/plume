# Stack de développement local — Plume
# FrankenPHP (API) + Postgres + workers Messenger (async = events, io = relèves) + Scheduler + Nuxt
name: plume

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: plume
      POSTGRES_USER: plume
      POSTGRES_PASSWORD: plume
    ports:
      # Accès local uniquement (clients SQL sur la machine hôte) — pas d'exposition LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plume"]
      interval: 5s
      timeout: 3s
      retries: 10

  php:
    build:
      context: ./api
    environment:
      # `php` en plus de `localhost` : le front conteneurisé (profil full) proxifie
      # vers https://php — Caddy doit servir ce hostname (sinon alerte TLS/SNI).
      # Schéma explicite : « php » nu serait pris pour la directive Caddy du même nom.
      SERVER_NAME: "localhost, https://php"
      # CA locale en dev (les hostnames sans point ne sont pas éligibles ACME).
      CADDY_GLOBAL_OPTIONS: "local_certs"
      DATABASE_URL: "postgresql://plume_app:plume_app@database:5432/plume?serverVersion=17&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      APP_ENV: dev
    ports:
      - "8443:443"   # https://localhost:8443 (FrankenPHP) — ports bas souvent déjà pris en local
    volumes:
      - ./api:/app
      - caddy-data:/data
    depends_on:
      database:
        condition: service_healthy

  # Consommateur des domain events LÉGERS (file `async` : outbox -> projections/policies, ex.
  # journal d'interactions). Les I/O réseau lourdes vont sur `worker_io` (file `io`) — cf. §5.
  # Dans la stack PAR DÉFAUT depuis M1.2 : la timeline en dépend.
  worker:
    build:
      context: ./api
    command: ["php", "bin/console", "messenger:consume", "async", "-vv", "--time-limit=3600"]
    healthcheck:
      disable: true   # ne sert pas de HTTP (healthcheck FrankenPHP hérité inadapté)
    environment:
      DATABASE_URL: "postgresql://plume_app:plume_app@database:5432/plume?serverVersion=17&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      APP_ENV: dev
    volumes:
      - ./api:/app
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # Worker DÉDIÉ aux commandes à I/O réseau lourde (relève RSS/IMAP/Graph, file `io`).
  # Séparé du `worker` (events légers/projections sur `async`) : une relève lente d'un tenant
  # n'affame plus les projections des autres (isolation de charge, dette ADR-0022 §5). Même rôle
  # runtime plume_app (tenant activé par message → RLS).
  worker_io:
    build:
      context: ./api
    command: ["php", "bin/console", "messenger:consume", "io", "-vv", "--time-limit=3600"]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: "postgresql://plume_app:plume_app@database:5432/plume?serverVersion=17&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      APP_ENV: dev
    volumes:
      - ./api:/app
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # Symfony Scheduler (relances dues, recalculs périodiques).
  # PROPRIÉTAIRE `plume` (contourne la RLS) : ses tâches sont des tâches de MAINTENANCE
  # cross-tenant par conception (énumération des tenants à relever, purge globale du brut).
  # Il ne sert AUCUN trafic utilisateur et se contente de fan-out : les messages par-tenant
  # qu'il émet partent sur `async`, consommés par le `worker` (plume_app, tenant activé → RLS).
  scheduler:
    profiles: ["full"]
    build:
      context: ./api
    command: ["php", "bin/console", "messenger:consume", "scheduler_default", "-vv"]
    healthcheck:
      disable: true   # ne sert pas de HTTP (healthcheck FrankenPHP hérité inadapté)
    environment:
      DATABASE_URL: "postgresql://plume:plume@database:5432/plume?serverVersion=17&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      APP_ENV: dev
    volumes:
      - ./api:/app
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  app:
    # Profil "full" seulement : en dev, on lance le front sur l'hôte (npm run dev)
    # pour éviter un second serveur Nuxt/watcher redondant.
    profiles: ["full"]
    image: node:24-alpine
    working_dir: /app
    user: "1000:1000"   # évite les fichiers root-owned dans app/ (node_modules, .nuxt)
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      HOME: /tmp
      NUXT_PUBLIC_API_BASE: ""
      NUXT_DEV_API_TARGET: "https://php/api"
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app

volumes:
  db-data:
  caddy-data:
