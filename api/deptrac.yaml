deptrac:
  paths:
    - ./src
  layers:
    - name: Domain
      collectors:
        - type: classNameRegex
          value: '#^App\\[A-Za-z0-9]+\\Domain\\#'
    - name: Application
      collectors:
        - type: classNameRegex
          value: '#^App\\[A-Za-z0-9]+\\Application\\#'
    - name: Infrastructure
      collectors:
        - type: classNameRegex
          value: '#^App\\[A-Za-z0-9]+\\Infrastructure\\#'
    - name: Framework
      collectors:
        - type: classNameRegex
          value: '#^(Symfony|Doctrine|ApiPlatform|Monolog)\\#'
  ruleset:
    # Le Domaine ne dépend de RIEN (ni Application, ni Infrastructure, ni Framework).
    Domain: ~
    # L'Application ne dépend que du Domaine (pas de framework).
    Application:
      - Domain
    # L'Infrastructure peut dépendre de tout le reste.
    Infrastructure:
      - Application
      - Domain
      - Framework
    Framework: ~
