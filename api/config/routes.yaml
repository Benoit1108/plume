api_login_check:
    path: /api/v1/login_check

api_token_refresh:
    path: /api/v1/token/refresh

# Révocation d'un refresh token (appelé au logout par le front).
api_token_invalidate:
    path: /api/v1/token/invalidate
    controller: App\Account\Infrastructure\Http\InvalidateRefreshTokenController
    methods: [POST]

# Identité de la session (le front ne peut plus lire le JWT : cookie httpOnly, M2.0).
api_me:
    path: /api/v1/me
    controller: App\Account\Infrastructure\Http\MeController
    methods: [GET]

# Changement du mot de passe de l'utilisateur courant (page Compte).
api_account_password:
    path: /api/v1/account/password
    controller: App\Account\Infrastructure\Http\ChangePasswordController
    methods: [POST]

# RGPD : suppression du compte courant (soft-delete + purge différée).
api_account_delete:
    path: /api/v1/account
    controller: App\Account\Infrastructure\Http\DeleteAccountController
    methods: [DELETE]

# RGPD : export de toutes les données du compte (archive ZIP : JSON + CSV).
api_account_export:
    path: /api/v1/account/export
    controller: App\Account\Infrastructure\Http\ExportAccountController
    methods: [GET]
