api_login_check:
    path: /api/v1/login_check

api_token_refresh:
    path: /api/v1/token/refresh

# Révocation d'un refresh token (appelé au logout par le front).
api_token_invalidate:
    path: /api/v1/token/invalidate
    controller: App\Account\Infrastructure\Http\InvalidateRefreshTokenController
    methods: [POST]

# Identité de la session (le front ne peut plus lire le JWT : cookie httpOnly, M2.0).
api_me:
    path: /api/v1/me
    controller: App\Account\Infrastructure\Http\MeController
    methods: [GET]
