parameters:
    # Rédaction assistée : clé absente => générateur local (canned), coût zéro.
    env(ANTHROPIC_API_KEY): ''
    env(DRAFTING_MODEL): 'claude-sonnet-5'
    # Passerelle email : sans GOOGLE_CLIENT_ID => connecteur factice (coût zéro).
    env(GOOGLE_CLIENT_ID): ''
    env(GOOGLE_CLIENT_SECRET): ''
    env(GOOGLE_REDIRECT_URI): 'http://localhost:3000/oauth/gmail/callback'
    env(MICROSOFT_CLIENT_ID): ''
    env(MICROSOFT_CLIENT_SECRET): ''
    env(MICROSOFT_REDIRECT_URI): 'http://localhost:3000/oauth/outlook/callback'
    # Connecteur factice (dev/CI/E2E) : le callback retombe sur la route dynamique front.
    env(MAILBOX_FAKE_REDIRECT_URI): 'http://localhost:3000/oauth/gmail/callback'
    env(MAILBOX_ENCRYPTION_KEY): ''
    drafting.anthropic_api_key: '%env(string:ANTHROPIC_API_KEY)%'
    drafting.model: '%env(string:DRAFTING_MODEL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Enregistrement des handlers via marqueurs (pas d'attribut framework en couche Application).
    _instanceof:
        App\Shared\Application\Command\CommandHandler:
            tags:
                - { name: messenger.message_handler, bus: command.bus }
        App\Shared\Application\Query\QueryHandler:
            tags:
                - { name: messenger.message_handler, bus: query.bus }

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'
            # Le domaine est du PHP pur : pas de services, pas d'autowiring.
            - '../src/*/Domain/'

    # Buses CQRS : les implémentations Messenger réalisent les ports de la couche Application.
    App\Shared\Application\Command\CommandBus: '@App\Shared\Infrastructure\Bus\MessengerCommandBus'
    App\Shared\Application\Query\QueryBus: '@App\Shared\Infrastructure\Bus\MessengerQueryBus'
    App\Shared\Application\Event\EventBus: '@App\Shared\Infrastructure\Bus\MessengerEventBus'

    # Ports techniques de la couche Application (horloge, identifiants).
    App\Shared\Application\Clock: '@App\Shared\Infrastructure\Time\SystemClock'
    App\Shared\Application\IdGenerator: '@App\Shared\Infrastructure\Uid\UuidV7IdGenerator'

    # Repositories : interface (Domain, hors conteneur) -> implémentation (Infrastructure).
    App\Prospecting\Domain\Lead\LeadRepository: '@App\Prospecting\Infrastructure\Persistence\Doctrine\DoctrineLeadRepository'
    App\Directory\Domain\Organization\OrganizationRepository: '@App\Directory\Infrastructure\Persistence\Doctrine\DoctrineOrganizationRepository'

    # Read models (côté query du CQRS) : lecture SQL directe, scoping tenant fail-closed.
    App\Directory\Application\ReadModel\OrganizationSearch: '@App\Directory\Infrastructure\ReadModel\DoctrineOrganizationSearch'
    App\Prospecting\Application\ReadModel\LeadSearch: '@App\Prospecting\Infrastructure\ReadModel\DoctrineLeadSearch'
    App\Prospecting\Application\ReadModel\LeadTimeline: '@App\Prospecting\Infrastructure\ReadModel\DoctrineLeadTimeline'
    App\Prospecting\Application\ReadModel\TodayBoard: '@App\Prospecting\Infrastructure\ReadModel\DoctrineTodayBoard'
    App\Prospecting\Application\ReadModel\Dashboard: '@App\Prospecting\Infrastructure\ReadModel\DoctrineDashboard'

    App\Account\Domain\Profile\ProfileRepository: '@App\Account\Infrastructure\Persistence\Doctrine\DoctrineProfileRepository'
    App\Account\Application\ReadModel\ProfileSettings: '@App\Account\Infrastructure\ReadModel\DoctrineProfileSettings'

    # Frontière de contexte Prospection → Répertoire (port applicatif).
    App\Prospecting\Application\OrganizationGateway: '@App\Prospecting\Infrastructure\Gateway\DirectoryOrganizationGateway'

    # Contexte Drafting (rédaction assistée).
    App\Drafting\Domain\Draft\DraftRepository: '@App\Drafting\Infrastructure\Persistence\Doctrine\DoctrineDraftRepository'
    App\Drafting\Domain\Template\TemplateRepository: '@App\Drafting\Infrastructure\Persistence\Doctrine\DoctrineTemplateRepository'
    App\Drafting\Application\ReadModel\DraftSearch: '@App\Drafting\Infrastructure\ReadModel\DoctrineDraftSearch'
    App\Drafting\Application\ReadModel\TemplateSearch: '@App\Drafting\Infrastructure\ReadModel\DoctrineTemplateSearch'
    App\Drafting\Application\LeadGateway: '@App\Drafting\Infrastructure\Gateway\DoctrineLeadGateway'

    # Contexte Mailbox (passerelle email, M2).
    App\Mailbox\Domain\Mailbox\MailboxRepository: '@App\Mailbox\Infrastructure\Persistence\Doctrine\DoctrineMailboxRepository'
    App\Mailbox\Application\ReadModel\MailboxSettings: '@App\Mailbox\Infrastructure\ReadModel\DoctrineMailboxSettings'
    App\Mailbox\Application\TokenCipher: '@App\Mailbox\Infrastructure\Crypto\SodiumTokenCipher'
    App\Mailbox\Infrastructure\Crypto\SodiumTokenCipher:
        arguments:
            $encodedKey: '%env(string:MAILBOX_ENCRYPTION_KEY)%'
            $appSecret: '%env(string:APP_SECRET)%'
            $environment: '%kernel.environment%'
    App\Mailbox\Infrastructure\OAuth\OAuthStateCodec:
        arguments:
            $appSecret: '%env(string:APP_SECRET)%'
    # Registres par fournisseur (D1 : Gmail + Outlook ; factice sans identifiants).
    App\Mailbox\Application\MailboxConnectorRegistry: '@App\Mailbox\Infrastructure\OAuth\ProviderMailboxConnectorRegistry'
    App\Mailbox\Infrastructure\OAuth\ProviderMailboxConnectorRegistry:
        arguments:
            $googleClientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $microsoftClientId: '%env(string:MICROSOFT_CLIENT_ID)%'
    App\Mailbox\Infrastructure\OAuth\GmailConnector:
        arguments:
            $clientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(string:GOOGLE_CLIENT_SECRET)%'
            $redirectUri: '%env(string:GOOGLE_REDIRECT_URI)%'
    App\Mailbox\Infrastructure\OAuth\OutlookConnector:
        arguments:
            $clientId: '%env(string:MICROSOFT_CLIENT_ID)%'
            $clientSecret: '%env(string:MICROSOFT_CLIENT_SECRET)%'
            $redirectUri: '%env(string:MICROSOFT_REDIRECT_URI)%'
    App\Mailbox\Infrastructure\OAuth\FakeMailboxConnector:
        arguments:
            $redirectUri: '%env(string:MAILBOX_FAKE_REDIRECT_URI)%'

    App\Mailbox\Domain\Outbound\OutboundMessageRepository: '@App\Mailbox\Infrastructure\Persistence\Doctrine\DoctrineOutboundMessageRepository'
    App\Mailbox\Application\DraftGateway: '@App\Mailbox\Infrastructure\Gateway\DoctrineDraftGateway'
    App\Mailbox\Application\RecipientResolver: '@App\Mailbox\Infrastructure\Gateway\DoctrineRecipientResolver'
    App\Mailbox\Application\OpenThreads: '@App\Mailbox\Infrastructure\ReadModel\DoctrineOpenThreads'
    # M3.2 — alertes email : relève du label dédié (factice par défaut ; adaptateurs réels = suivi).
    App\Mailbox\Application\AlertEmailFetcher: '@App\Mailbox\Infrastructure\Fetcher\FakeAlertEmailFetcher'
    App\Mailbox\Application\ReplyFetcherRegistry: '@App\Mailbox\Infrastructure\Fetcher\ProviderReplyFetcherRegistry'
    App\Mailbox\Infrastructure\Fetcher\ProviderReplyFetcherRegistry:
        arguments:
            $googleClientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $microsoftClientId: '%env(string:MICROSOFT_CLIENT_ID)%'
    App\Mailbox\Infrastructure\Fetcher\GmailReplyFetcher:
        arguments:
            $tokenMinter: '@mailbox.google_token_minter'
    App\Mailbox\Infrastructure\Fetcher\OutlookReplyFetcher:
        arguments:
            $tokenMinter: '@mailbox.microsoft_token_minter'

    # Frappe d'access token OAuth, une instance par fournisseur (partagée sender+fetcher).
    mailbox.google_token_minter:
        class: App\Mailbox\Infrastructure\Token\OAuthAccessTokenMinter
        arguments:
            $tokenEndpoint: 'https://oauth2.googleapis.com/token'
            $clientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(string:GOOGLE_CLIENT_SECRET)%'
    mailbox.microsoft_token_minter:
        class: App\Mailbox\Infrastructure\Token\OAuthAccessTokenMinter
        arguments:
            $tokenEndpoint: 'https://login.microsoftonline.com/common/oauth2/v2.0/token'
            $clientId: '%env(string:MICROSOFT_CLIENT_ID)%'
            $clientSecret: '%env(string:MICROSOFT_CLIENT_SECRET)%'

    # Registre d'expéditeurs par fournisseur.
    App\Mailbox\Application\MailSenderRegistry: '@App\Mailbox\Infrastructure\Sender\ProviderMailSenderRegistry'
    App\Mailbox\Infrastructure\Sender\ProviderMailSenderRegistry:
        arguments:
            $googleClientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $microsoftClientId: '%env(string:MICROSOFT_CLIENT_ID)%'
    App\Mailbox\Infrastructure\Sender\GmailMailSender:
        arguments:
            $tokenMinter: '@mailbox.google_token_minter'
    App\Mailbox\Infrastructure\Sender\OutlookMailSender:
        arguments:
            $tokenMinter: '@mailbox.microsoft_token_minter'

    # Port MessageGenerator : sélection par env (clé présente => Claude, sinon canned).
    App\Drafting\Application\MessageGenerator: '@App\Drafting\Infrastructure\Generator\MessageGeneratorSelector'
    App\Drafting\Infrastructure\Generator\MessageGeneratorSelector:
        arguments:
            $apiKey: '%drafting.anthropic_api_key%'
    App\Drafting\Infrastructure\Generator\ClaudeMessageGenerator:
        arguments:
            $apiKey: '%drafting.anthropic_api_key%'
            $model: '%drafting.model%'

    # Contexte Sourcing (ingestion d'annonces, M3) : repo + frontières par gateway.
    App\Sourcing\Domain\CandidateLead\CandidateLeadRepository: '@App\Sourcing\Infrastructure\Persistence\Doctrine\DoctrineCandidateLeadRepository'
    App\Sourcing\Application\Gateway\DirectoryGateway: '@App\Sourcing\Infrastructure\Gateway\CommandBusDirectoryGateway'
    App\Sourcing\Application\Gateway\ProspectingGateway: '@App\Sourcing\Infrastructure\Gateway\CommandBusProspectingGateway'
    App\Sourcing\Application\ReadModel\CandidateQueue: '@App\Sourcing\Infrastructure\ReadModel\DoctrineCandidateQueue'

    # M3.1a/b — ingestion : brut conservé + flux configurés par tenant.
    App\Sourcing\Domain\RawAlert\RawAlertRepository: '@App\Sourcing\Infrastructure\Persistence\Doctrine\DoctrineRawAlertRepository'
    App\Sourcing\Domain\AlertFeed\AlertFeedRepository: '@App\Sourcing\Infrastructure\Persistence\Doctrine\DoctrineAlertFeedRepository'
    App\Sourcing\Application\ReadModel\AlertFeedList: '@App\Sourcing\Infrastructure\ReadModel\DoctrineAlertFeedList'
    # Relève : source réelle (RSS) pour les flux configurés, source de démo en repli (aucun flux).
    App\Sourcing\Application\Command\PollAlertSource\PollAlertSourceHandler:
        arguments:
            $source: '@App\Sourcing\Infrastructure\Source\RssAlertSource'
            $demoSource: '@App\Sourcing\Infrastructure\Source\FakeAlertSource'
    # Anti-SSRF : le fetch RSS d'une URL fournie par le tenant passe par un client qui REFUSE
    # les IP privées/réservées (localhost, 169.254.169.254, 10/8…), y compris après redirection.
    sourcing.rss.http_client:
        class: Symfony\Component\HttpClient\NoPrivateNetworkHttpClient
        arguments: ['@http_client']
    App\Sourcing\Infrastructure\Source\RssAlertSource:
        arguments:
            $httpClient: '@sourcing.rss.http_client'
