gesdinet_jwt_refresh_token:
    refresh_token_class: App\Account\Infrastructure\Auth\RefreshToken
    ttl: 2592000   # 30 jours
    # Rotation : chaque refresh consomme le token et en émet un nouveau.
    # Un refresh token volé ne survit donc pas au prochain usage légitime.
    single_use: true

    # M2.0 — refresh token en cookie httpOnly, envoyé UNIQUEMENT aux endpoints
    # token (path) ; jamais dans le corps des réponses (remove_token_from_body).
    cookie:
        enabled: true
        same_site: lax
        path: /api/v1/token
        http_only: true
        secure: true

# En test : le corps reste lisible (les fonctionnels manipulent le refresh token
# explicitement) ; le cookie continue d'être posé et vérifié par AuthCookieTest.
when@test:
    gesdinet_jwt_refresh_token:
        cookie:
            enabled: true
            remove_token_from_body: false
