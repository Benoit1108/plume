security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # M0 : provider en mémoire (un utilisateur de dev).
    # TODO M0-finalisation : basculer sur un provider entité du contexte Account,
    # et injecter le tenant_id dans les claims JWT (voir TenantContext).
    providers:
        dev_users:
            memory:
                users:
                    dev@plume.local:
                        password: '$2y$13$changeme_hash_placeholder_replace_me_now'
                        roles: ['ROLE_USER']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/v1/login_check$
            stateless: true
            json_login:
                check_path: /api/v1/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        refresh:
            pattern: ^/api/v1/token/refresh$
            stateless: true
            refresh_jwt:
                check_path: /api/v1/token/refresh

        api:
            pattern: ^/api/v1
            stateless: true
            provider: dev_users
            jwt: ~

    access_control:
        - { path: ^/api/v1/login_check$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/token/refresh$, roles: PUBLIC_ACCESS }
        - { path: ^/api/(v1/)?docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
