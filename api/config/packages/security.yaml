security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Account\Infrastructure\Persistence\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/v1/login_check$
            stateless: true
            # RGPD : refuse l'accès à un compte en cours de suppression (soft-delete).
            user_checker: App\Account\Infrastructure\Security\AccountStatusChecker
            # Anti force brute : 5 tentatives / 15 min (par IP + identifiant).
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            json_login:
                check_path: /api/v1/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        refresh:
            pattern: ^/api/v1/token/refresh$
            stateless: true
            provider: app_users
            user_checker: App\Account\Infrastructure\Security\AccountStatusChecker
            refresh_jwt:
                check_path: /api/v1/token/refresh

        api:
            pattern: ^/api/v1
            stateless: true
            provider: app_users
            user_checker: App\Account\Infrastructure\Security\AccountStatusChecker
            jwt: ~

    access_control:
        - { path: ^/api/v1/login_check$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/token/(refresh|invalidate)$, roles: PUBLIC_ACCESS }
        # /docs public en dev/test uniquement (surchargé en prod ci-dessous).
        - { path: ^/api/(v1/)?docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: ROLE_USER }

when@prod:
    security:
        # En prod, le contrat OpenAPI n'est pas public : la liste remplace celle du dessus.
        access_control:
            - { path: ^/api/v1/login_check$, roles: PUBLIC_ACCESS }
            - { path: ^/api/v1/token/(refresh|invalidate)$, roles: PUBLIC_ACCESS }
            - { path: ^/api/(v1/)?docs, roles: ROLE_USER }
            - { path: ^/api/v1, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
