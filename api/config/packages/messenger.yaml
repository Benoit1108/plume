framework:
    messenger:
        default_bus: command.bus

        buses:
            # Une commande = une transaction (doctrine_transaction).
            command.bus:
                middleware:
                    - doctrine_transaction
            # Lectures.
            query.bus:
                default_middleware:
                    allow_no_handlers: false
            # Outbox transactionnel : les domain events sont insérés dans le transport
            # async (table messenger_messages) DANS la transaction de la commande
            # (doctrine_transaction) — atomicité garantie, aucun event perdu.
            event.bus:
                default_middleware:
                    allow_no_handlers: true

        # Après épuisement des retries, les messages partent dans `failed`
        # (table messenger_messages, queue dédiée) au lieu d'être perdus —
        # cohérent avec la garantie outbox « aucun event perdu ».
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: failed
            # Outbox : l'INSERT dans le transport doctrine rejoint la transaction
            # de la commande (même connexion) — atomicité garantie.
            # scheduler_default est fourni par symfony/scheduler.

        routing:
            # Les domain events (marqueur) partent en asynchrone.
            'App\Shared\Domain\DomainEvent': async
