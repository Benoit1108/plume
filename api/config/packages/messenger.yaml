framework:
    messenger:
        default_bus: command.bus

        buses:
            # Une commande = une transaction (doctrine_transaction).
            # tenant_isolation en PREMIER (hors transaction) : ardoise tenant propre par
            # message worker, avant que la transaction et les requêtes ne s'ouvrent.
            command.bus:
                middleware:
                    - App\Shared\Infrastructure\Messenger\TenantIsolationMiddleware
                    - doctrine_transaction
            # Lectures.
            query.bus:
                default_middleware:
                    allow_no_handlers: false
            # Outbox transactionnel : les domain events sont insérés dans le transport
            # async (table messenger_messages) DANS la transaction de la commande
            # (doctrine_transaction) — atomicité garantie, aucun event perdu.
            event.bus:
                default_middleware:
                    allow_no_handlers: true
                middleware:
                    - App\Shared\Infrastructure\Messenger\TenantIsolationMiddleware

        # Après épuisement des retries, les messages partent dans `failed`
        # (table messenger_messages, queue dédiée) au lieu d'être perdus —
        # cohérent avec la garantie outbox « aucun event perdu ».
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    # Le rôle runtime plume_app n'a PAS le droit CREATE (RLS, moindre privilège) :
                    # la table/trigger messenger_messages est créée par `messenger:setup-transports`
                    # en propriétaire (cf. Makefile/CI), jamais auto-créée au 1er dispatch.
                    auto_setup: false
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            # Transport DÉDIÉ aux commandes à I/O réseau lourde et potentiellement lente (relève
            # RSS, lecture IMAP/Graph). Consommé par un worker SÉPARÉ (`worker_io`) : une relève
            # lente d'un tenant n'affame plus les projections/policies légères de la file `async`
            # de tous les autres (isolation de charge inter-contextes, dette ADR-0022 §5).
            io:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    queue_name: io
                    auto_setup: false
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: failed
                    auto_setup: false
            # Outbox : l'INSERT dans le transport doctrine rejoint la transaction
            # de la commande (même connexion) — atomicité garantie.
            # scheduler_default est fourni par symfony/scheduler.

        routing:
            # Les domain events (marqueur) partent en asynchrone.
            'App\Shared\Domain\DomainEvent': async

when@test:
    framework:
        messenger:
            transports:
                # En test, events ET commandes I/O sont consommés EN LIGNE (projections/relèves
                # immédiates, assertions déterministes). La prod reste asynchrone (outbox + workers).
                async: 'sync://'
                io: 'sync://'
