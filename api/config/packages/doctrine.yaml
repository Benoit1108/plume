doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        types:
            lead_id: App\Prospecting\Infrastructure\Persistence\Doctrine\Type\LeadIdType
            tenant_id: App\Shared\Infrastructure\Persistence\Doctrine\Type\TenantIdType
            language_code: App\Shared\Infrastructure\Persistence\Doctrine\Type\LanguageCodeType
            organization_id: App\Directory\Infrastructure\Persistence\Doctrine\Type\OrganizationIdType
            country_code: App\Directory\Infrastructure\Persistence\Doctrine\Type\CountryCodeType
            language_code_list: App\Directory\Infrastructure\Persistence\Doctrine\Type\LanguageCodeListType
            segment_list: App\Directory\Infrastructure\Persistence\Doctrine\Type\SegmentListType
            contact_collection: App\Directory\Infrastructure\Persistence\Doctrine\Type\ContactCollectionType
            language_pair: App\Prospecting\Infrastructure\Persistence\Doctrine\Type\LanguagePairType
            follow_up_collection: App\Prospecting\Infrastructure\Persistence\Doctrine\Type\FollowUpCollectionType
            draft_id: App\Drafting\Infrastructure\Persistence\Doctrine\Type\DraftIdType
            template_id: App\Drafting\Infrastructure\Persistence\Doctrine\Type\TemplateIdType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            # Entités d'infrastructure (attributs). Les agrégats du Domaine restent
            # purs et seront mappés en XML par contexte (M1).
            Account:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Account/Infrastructure/Persistence'
                prefix: 'App\Account\Infrastructure\Persistence'
            Prospecting:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/prospecting'
                prefix: 'App\Prospecting\Domain\Lead'
            Directory:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/directory'
                prefix: 'App\Directory\Domain\Organization'
            DraftingDraft:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/drafting-draft'
                prefix: 'App\Drafting\Domain\Draft'
            DraftingTemplate:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/drafting-template'
                prefix: 'App\Drafting\Domain\Template'
            AccountProfile:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/account-profile'
                prefix: 'App\Account\Domain\Profile'
            AccountAuth:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/config/doctrine/account'
                prefix: 'App\Account\Infrastructure\Auth'
            GesdinetRefreshToken:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/vendor/gesdinet/jwt-refresh-token-bundle/config/doctrine'
                prefix: 'Gesdinet\JWTRefreshTokenBundle\Entity'
        filters:
            # Isolation multi-tenant : activé par requête (TenantContextListener).
            tenant:
                class: App\Shared\Infrastructure\Doctrine\Tenancy\TenantFilter
                enabled: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool
