api_platform:
    title: Plume API
    version: 0.1.0
    description: API du mini-CRM de prospection Plume
    # Les ApiResource sont des DTO exposés en Infrastructure ; jamais les entités
    # Doctrine ni les agrégats. State Providers/Processors délèguent au bus CQRS.
    mapping:
        paths:
            - '%kernel.project_dir%/src'
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    # Les erreurs métier (hiérarchie App\Shared\Domain\Exception) sont mappées vers
    # des statuts HTTP sémantiques — RFC 7807 natif pour le corps de la réponse.
    exception_to_status:
        App\Shared\Domain\Exception\InvalidValue: 422
        App\Shared\Domain\Exception\NotFound: 404
        App\Shared\Domain\Exception\Conflict: 409
    # Versionnement /api/v1 : préfixe de montage dans config/routes/api_platform.yaml.
